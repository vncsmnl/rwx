name: rwx
base: core22
adopt-info: rwx
summary: Interactive Unix file permissions and ownership TUI manager
description: |
  rwx simplifies inspect/audit operations on files and folders, enabling developers 
  and administrators to quickly visualize permissions, toggle individual bits interactively, 
  change owners/groups, and safely apply changes recursively.

grade: stable
confinement: classic # Required to manage file permissions across the entire host system

parts:
  rwx:
    plugin: rust
    source: .
    # Set adoption info to parse version from Cargo.toml
    override-pull: |
      craftctl default
      craftctl set version=$(cargo metadata --format-version 1 | grep -o '"version":"[^"]*"' | head -n1 | cut -d'"' -f4)

apps:
  rwx:
    command: bin/rwx
